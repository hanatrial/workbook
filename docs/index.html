  state.tasks.push({ id:uid(), title:t.title, desc:t.desc, picId:t.picId, creatorId:t.creatorId,
    priority:t.priority, status:'todo', due:nextDue, createdAt:Date.now(), repeat:t.repeat, link:t.link||null,
    photoId:null, comments:[], checklist:(t.checklist||[]).map(it=>({id:uid(),text:it.text,done:false})) });

/* ---- @mentions ---- */
function renderMentions(escapedText){
  const names=state.members.map(m=>m.name.split(' ')[0]).sort((a,b)=>b.length-a.length);
  const tokens=[...names,'all'].sort((a,b)=>b.length-a.length);
  if(!tokens.length) return escapedText;
  const re=new RegExp('@('+tokens.map(n=>n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','g');
  return escapedText.replace(re,(m,name)=>name==='all'?`<b class="mention mention-all">@all</b>`:`<b class="mention">@${name}</b>`);
}
let _mentionState=null;
function onMentionInput(input){
  const val=input.value, pos=input.selectionStart;
  const before=val.slice(0,pos);
  const m=before.match(/(^|\s)@([a-zA-Z]*)$/);
  const pop=$('#mentionPop');
  if(!pop) return;
  if(!m){ _mentionState=null; pop.classList.remove('show'); pop.innerHTML=''; return; }
  const query=m[2].toLowerCase();
  let matches=state.members.filter(mem=>mem.name.split(' ')[0].toLowerCase().startsWith(query));
  if('all'.startsWith(query)) matches=[{id:'all',name:'Everyone',special:true}, ...matches];
  matches=matches.slice(0,6);
  if(!matches.length){ _mentionState=null; pop.classList.remove('show'); pop.innerHTML=''; return; }
  _mentionState={start:pos-m[2].length-1, end:pos, inputId:input.id};
  pop.dataset.firstId=matches[0].id;
  pop.innerHTML=matches.map((mem,i)=>{
    const av = mem.special ? `<span class="av mention-all-av">@</span>` : avatar(mem.id);
    const label = mem.special ? 'Everyone' : mem.name.split(' ')[0];
    return `<button type="button" class="mention-item ${i===0?'sel':''}" onmousedown="event.preventDefault();pickMention('${mem.id}')">${av}<span>${esc(label)}</span></button>`;
  }).join('');
  pop.classList.add('show');
}
function pickMention(memberId){
  if(!_mentionState) return;
  const input=$('#'+_mentionState.inputId); if(!input) return;
  const name=memberId==='all' ? 'all' : member(memberId).name.split(' ')[0];
  const val=input.value;
  const newVal=val.slice(0,_mentionState.start)+'@'+name+' '+val.slice(_mentionState.end);
  input.value=newVal;
  const newPos=_mentionState.start+name.length+2;
  input.focus(); input.setSelectionRange(newPos,newPos);
  _mentionState=null; const pop=$('#mentionPop'); if(pop){ pop.classList.remove('show'); pop.innerHTML=''; }
}
function closeMentionPop(){
  _mentionState=null; const pop=$('#mentionPop'); if(pop){ pop.classList.remove('show'); pop.innerHTML=''; }
}
function handleMentionOnlyKey(e){
  if(e.key!=='Enter') return;
  const pop=$('#mentionPop');
  if(pop && pop.classList.contains('show')){ e.preventDefault(); const fid=pop.dataset.firstId; if(fid) pickMention(fid); }
}

    const nameEsc = esc(member(c.authorId)?.name.split(' ')[0]||'?').replace(/'/g,"\\'");
    return `<div class="cmt">${avatar(c.authorId,'')}
    <div class="cb">${replyTag}<div class="ch"><b>${esc(member(c.authorId)?.name.split(' ')[0]||'?')}</b><time>${timeAgo(c.createdAt)}</time></div><p>${renderMentions(esc(c.text))}</p>
    <button type="button" class="cmt-reply-btn" onclick="startReply('${c.id}','${nameEsc}','${kind}','${id}')">Reply</button></div></div>`;

function handleCommentKey(e,kind,id){

function myUrgentTasks(){
  if(!state.currentUserId) return [];
  return state.tasks.filter(t=>t.status!=='done' && t.picId===state.currentUserId && t.due)
    .map(t=>({t, du:dueState(t.due)}))
    .filter(x=>x.du && x.du.cls==='due')             // 'due' = overdue, due today, or due within 2 days
    .sort((a,b)=> new Date(a.t.due) - new Date(b.t.due));
}
function reminderBanner(){
  const urgent=myUrgentTasks(); if(!urgent.length) return '';
  const overdue=urgent.filter(x=>x.du.t.startsWith('Overdue'));
  const tone = overdue.length ? 'danger' : 'warn';
  const headline = overdue.length
    ? `${overdue.length} of your tasks ${overdue.length>1?'are':'is'} overdue`
    : `${urgent.length} of your tasks ${urgent.length>1?'are':'is'} due soon`;
  return `<div class="card reminder-card ${tone}" onclick="taskFilter='mine';route='tasks';render();window.scrollTo(0,0)" role="button" tabindex="0" onkeydown="if(event.key==='Enter'){this.click()}">
    <span class="reminder-icon">${overdue.length?'⏰':'🔔'}</span>
    <div class="reminder-body">
      <b>${esc(headline)}</b>
      <div class="reminder-list">${urgent.slice(0,3).map(x=>`<span>${esc(x.t.title)} · ${x.du.t}</span>`).join('')}${urgent.length>3?`<span>+${urgent.length-3} lagi</span>`:''}</div>
    </div>
  </div>`;
}
function viewStories(){
  const list=[...(state.stories||[])].sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0) || b.createdAt-a.createdAt);
  const meName=me()?me().name.split(' ')[0]:null;
  const h=new Date().getHours();
  const greet=h<11?'Good morning':h<15?'Good afternoon':h<19?'Good evening':'Good night';
  const dayStr=new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'});
  const head=`<div class="view-title hero-greet"><div>
    <div class="hg-day">${esc(dayStr)}</div>
    <h2>${meName?esc(greet)+', '+esc(meName)+' 👋':'Cerita'}</h2>
    <div class="hg-sub">News & stories from Keluarga Sultan</div>
  </div></div>` + reminderBanner();
  if(!list.length) return head+emptyBox('👇','The table is still empty','Be the first to share news, a fun photo, or a story today — the family is waiting!');
  return head+list.map(storyCard).join('');
}
function storyCard(s){
  const c=s.comments||[], photos=s.photos||[];
  const shown=photos.slice(0,4), extra=photos.length-shown.length;
  const grid = photos.length?`<div class="story-photos c${Math.min(photos.length,4)}">${shown.map((p,i)=>{
    const isLast=i===shown.length-1 && extra>0;
    return `<div class="stphoto-wrap" onclick="openStory('${s.id}')"><img src="${p}"/>${isLast?`<div class="stphoto-more">+${extra}</div>`:''}</div>`;
  }).join('')}</div>`:'';
  return `<div class="card photo-card">
    <div class="photo-head">${avatar(s.authorId)}
      <div class="meta"><b>${esc(member(s.authorId)?.name||'?')}</b><small>${timeAgo(s.createdAt)}</small></div>
      ${s.pinned?`<span class="pin-badge" title="Pinned Cerita">📌</span>`:''}</div>
    ${s.text?`<div class="photo-body" style="padding-bottom:${photos.length?'10px':'12px'}"><p class="cap" style="margin:0;cursor:pointer" onclick="openStory('${s.id}')">${renderMentions(esc(s.text))}</p></div>`:''}
    ${grid}
    <div class="photo-body" style="padding-top:11px">
      ${reactionBar(s)}
      ${c.length?`<div class="cmt-preview">${c.slice(-2).map(cm=>`<div class="cmt-preview-row"><b>${esc(member(cm.authorId)?.name.split(' ')[0]||'?')}</b> <span>${renderMentions(esc(cm.text))}</span></div>`).join('')}</div>`:''}
    </div>
  </div>`;
}
const HEART_OUTLINE=`<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M34.6 6.1c-6 0-9.4 5.1-10.6 7.3-1.2-2.2-4.6-7.3-10.6-7.3C6 6.1 1 11.6 1 18.4c0 11.3 15.4 20.9 22 27.2 6.6-6.3 22-15.9 22-27.2 0-6.8-5-12.3-11.4-12.3z"/></svg>`;
const HEART_FILLED=`<svg viewBox="0 0 48 48" fill="currentColor"><path d="M34.6 6.1c-6 0-9.4 5.1-10.6 7.3-1.2-2.2-4.6-7.3-10.6-7.3C6 6.1 1 11.6 1 18.4c0 11.3 15.4 20.9 22 27.2 6.6-6.3 22-15.9 22-27.2 0-6.8-5-12.3-11.4-12.3z"/></svg>`;
const COMMENT_ICON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/></svg>`;
const SHARE_ICON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>`;
function reactionBar(s){
  const arr=(s.reactions&&s.reactions['❤️'])||[], liked=arr.includes(state.currentUserId);
  const names=arr.map(id=>esc(member(id)?.name.split(' ')[0]||'')).filter(Boolean);
  let likedText='';
  if(names.length===1) likedText=`Liked by <b>${names[0]}</b>`;
  else if(names.length===2) likedText=`Liked by <b>${names[0]}</b> and <b>${names[1]}</b>`;
  else if(names.length>2) likedText=`Liked by <b>${names[0]}</b> and <b>${names.length-1} others</b>`;
  return `<div class="ig-actions">
    <button class="ig-heart ${liked?'on':''}" data-rx="${s.id}:❤️" onclick="event.stopPropagation();toggleReact('${s.id}','❤️')" aria-label="Like" aria-pressed="${liked}">${liked?HEART_FILLED:HEART_OUTLINE}</button>
    <button onclick="event.stopPropagation();openStory('${s.id}')" aria-label="Comment">${COMMENT_ICON}</button>
    <button onclick="event.stopPropagation();shareStoryToWhatsApp('${s.id}')" aria-label="Share to WhatsApp">${SHARE_ICON}</button>
  </div>${likedText?`<p class="ig-liked-by">${likedText}</p>`:''}`;
}
function shareStoryToWhatsApp(id){
  const s=state.stories.find(x=>x.id===id); if(!s) return;
  const authorName=member(s.authorId)?.name||'Someone';
  const snippet=(s.text||'').trim();
  const text=`${authorName} shared a Cerita on Keluarga Sultan:\n"${snippet||'(photo)'}"\n\n${location.origin+location.pathname}`;
  if(navigator.share){ navigator.share({text}).catch(()=>{}); return; }
  window.open('https://wa.me/?text='+encodeURIComponent(text), '_blank');
}
function shareTaskToWhatsApp(id){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const st=STATUS[t.status], pr=PRIO[t.priority]||PRIO.med;
  const lines=[
    `📋 Task: ${t.title}`,
    `PIC: ${member(t.picId)?.name||'—'}`,
    `Status: ${st.t} · ${pr.t} priority`,
    t.due?`Due: ${t.due}`:null,
    t.desc?`\n${t.desc}`:null,
    t.link?`\n🔗 ${t.link}`:null,
    `\n${location.origin+location.pathname}`
  ].filter(Boolean);
  const text=lines.join('\n');
  if(navigator.share){ navigator.share({text}).catch(()=>{}); return; }
  window.open('https://wa.me/?text='+encodeURIComponent(text), '_blank');
}
function toggleReact(id,e){
  if(needMe()) return;
  const s=state.stories.find(x=>x.id===id); if(!s) return; s.reactions=s.reactions||{};
  const arr=s.reactions[e]=s.reactions[e]||[]; const i=arr.indexOf(state.currentUserId);
  const added=i<0;
  if(i>=0) arr.splice(i,1); else arr.push(state.currentUserId);
  if(!arr.length) delete s.reactions[e];
  persist();
  if($('#modalRoot').firstElementChild) openStory(id); else render();
  if(added){ document.querySelectorAll(`[data-rx="${id}:${e}"]`).forEach(el=>{ el.classList.add('pop'); el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true}); }); }
}
function openStory(id){
  const s=state.stories.find(x=>x.id===id); if(!s) return;
  const photos=(s.photos||[]).map(p=>`<img class="detail-img" src="${p}"/>`).join('');
  sheet('Cerita', `
    <div class="photo-head" style="padding:0 0 8px">${avatar(s.authorId)}<div class="meta"><b>${esc(member(s.authorId)?.name)}</b><small>${timeAgo(s.createdAt)}</small></div></div>
    ${s.text?`<p style="margin:0 0 12px;font-size:15px;white-space:pre-wrap">${renderMentions(esc(s.text))}</p>`:''}
    ${photos}
    ${reactionBar(s)}
    <button class="btn ghost" onclick="togglePinStory('${s.id}')" style="margin-top:14px">📌 ${s.pinned?'Unpin':'Pin this Cerita'}</button>
    <div style="font-weight:700;font-size:13px;margin:18px 2px 4px;color:var(--muted)">Comments (${(s.comments||[]).length})</div>
    <div id="cmtList">${renderComments(s.comments,'story',s.id)}</div>
    ${commentBox('story',s.id)}
    ${s.authorId===state.currentUserId?`<button class="btn danger" onclick="deleteStory('${s.id}')">Delete Cerita</button>`:''}`);
}
function togglePinStory(id){
  const s=state.stories.find(x=>x.id===id); if(!s) return;
  s.pinned=!s.pinned; persist(); openStory(id); render(); toast(s.pinned?'Cerita pinned 📌':'Unpinned');
}
function deleteStory(id){ confirmSheet('Delete this Cerita? This can\'t be undone.', ()=>{ state.stories=state.stories.filter(s=>s.id!==id); persist(); closeSheet(); render(); toast('Cerita deleted'); }, {title:'Are you sure?', confirmLabel:'Delete', cancelLabel:'Cancel', onCancel:()=>openStory(id)}); }
let draftStoryPhotos=[], pendingCompress=0;
function openStoryForm(){
  if(needMe()) return; draftStoryPhotos=[]; pendingCompress=0;
  sheet('Write a Cerita', `
    <label class="f">Your Cerita</label>
    <div style="position:relative"><div class="mention-pop" id="mentionPop"></div>
    <textarea class="in" id="stext" placeholder="What's up? Today's news, a fun moment, anything… 😄 (@ to tag someone)" oninput="onMentionInput(this)" onkeydown="handleMentionOnlyKey(event)" onblur="setTimeout(closeMentionPop,150)" onpaste="onStoryPaste(event)"></textarea></div>
    <label class="f">Photos (multiple allowed, optional) <span style="font-weight:500;color:var(--muted)">— you can also paste (Ctrl+V) a screenshot directly</span></label>
    <div id="stThumbs" class="story-thumbs"></div>
    <span class="compress-chip" id="compressChip"><span class="spin"></span>Processing photo…</span>
    <button class="btn ghost" onclick="$('#sf').click()" style="margin-top:8px">📷 Add photo</button>
    <input type="file" id="sf" accept="image/*" multiple class="hidden" onchange="pickStoryPhotos(event)"/>
    <button class="btn primary" id="storySubmit" onclick="saveStory()">Share Cerita</button>`);
}
function syncCompressUI(){
  const chip=$('#compressChip'), btn=$('#storySubmit');
  if(chip) chip.classList.toggle('show', pendingCompress>0);
  if(btn){ if(pendingCompress>0) btn.setAttribute('disabled',''); else btn.removeAttribute('disabled'); }
}
function addStoryPhotoFile(file){
  pendingCompress++; syncCompressUI();
  const rd=new FileReader();
  rd.onload=()=>compressImage(rd.result,1200,.7,out=>{ draftStoryPhotos.push(out); pendingCompress--; renderStThumbs(); syncCompressUI(); });
  rd.onerror=()=>{ pendingCompress--; syncCompressUI(); toast('One photo failed to load'); };
  rd.readAsDataURL(file);
}
function pickStoryPhotos(e){
  const files=[...e.target.files]; e.target.value='';
  files.forEach(addStoryPhotoFile);
}
function onStoryPaste(e){
  const items=(e.clipboardData||e.originalEvent?.clipboardData)?.items; if(!items) return;
  let gotImage=false;
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){
      const file=item.getAsFile();
      if(file){ gotImage=true; addStoryPhotoFile(file); }
    }
  }
  if(gotImage){ e.preventDefault(); toast('Photo pasted 📋'); }
}
function renderStThumbs(){ const el=$('#stThumbs'); if(!el) return;
  el.innerHTML=draftStoryPhotos.map((p,i)=>`<div class="stth"><img src="${p}"/><button onclick="draftStoryPhotos.splice(${i},1);renderStThumbs()">✕</button></div>`).join('');
}
function saveStory(){
  if(pendingCompress>0) return toast('Hold on, photo still processing…');
  const text=$('#stext').value.trim();
  if(!text && !draftStoryPhotos.length) return toast('Write something or add a photo first');
  state.stories.unshift({ id:uid(), authorId:state.currentUserId, text, photos:[...draftStoryPhotos], createdAt:Date.now(), reactions:{}, comments:[] });
  persist(); draftStoryPhotos=[]; closeSheet(); route='cerita'; render(); toast('Cerita shared 🎉');
}

/* ---- Boot ---- */
if(!state.stories) state.stories=[];      // migrate older saved data
if(!state.standup) state.standup=[];
if(!state.lastSeen) state.lastSeen={cerita:0,tasks:0};
(()=>{ const pinks=['#ec4899','#d946ef','#f43f5e','#db2777','#e11d48']; let changed=false;
  state.members.forEach((m,i)=>{ if(pinks.includes(String(m.color||'').toLowerCase())){ m.color=AVATAR_COLORS[i%AVATAR_COLORS.length]; changed=true; } });
  if(changed) persist(); })();   // drop any old pink avatar colours
render();
if(!state.currentUserId) setTimeout(openMePicker,350);
initPresence(); listenPresence(); initDataSync(); if(state.currentUserId) goOnline();
</script>
</body>
</html>
